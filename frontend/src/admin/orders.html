<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý giao hàng — Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
    <style>
        .sidebar { min-height: 100vh; background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); }
        .sidebar .nav-link { color: rgba(255,255,255,.75); border-radius: 8px; margin-bottom: 2px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: rgba(255,255,255,.15); color: #fff; }
        .sidebar .nav-link i { width: 20px; }
        .step { width: 40px; height: 40px; }
    </style>
</head>
<body class="bg-light">
<div class="d-flex">
    <div class="sidebar d-flex flex-column p-3" style="width:230px;flex-shrink:0">
        <a href="/" class="text-white text-decoration-none mb-4 ps-2">
            <i class="fas fa-shopping-bag me-2"></i><strong>ecom-final</strong>
            <div class="small text-muted mt-1">Bảng quản trị</div>
        </a>
        <nav class="nav flex-column gap-1">
            <a href="dashboard.html" class="nav-link"><i class="fas fa-chart-bar me-2"></i>Tổng quan</a>
            <a href="users.html"     class="nav-link"><i class="fas fa-users me-2"></i>Người dùng</a>
            <a href="products.html"  class="nav-link"><i class="fas fa-box me-2"></i>Sản phẩm</a>
            <a href="orders.html"    class="nav-link active"><i class="fas fa-truck me-2"></i>Giao hàng</a>
        </nav>
        <div class="mt-auto pt-3 border-top border-secondary">
            <div class="small text-muted mb-2" id="sidebarUser"></div>
            <a href="#" class="nav-link" onclick="doLogout();return false;"><i class="fas fa-sign-out-alt me-2"></i>Đăng xuất</a>
        </div>
    </div>

    <div class="flex-grow-1 p-4">
        <h5 class="fw-bold mb-1"><i class="fas fa-truck me-2 text-primary"></i>Quản lý giao hàng</h5>
        <p class="text-muted small mb-4">Nhập mã đơn để tra phiếu giao và cập nhật trạng thái (Processing → Shipping → Delivered).</p>

        <div id="pageAlert" class="alert d-none mb-3"></div>

        <div class="card shadow-sm mb-4" style="max-width:480px">
            <div class="card-body">
                <label class="form-label">Mã đơn hàng (order_id)</label>
                <div class="input-group">
                    <input type="number" id="orderIdInput" class="form-control" placeholder="VD: 12" min="1"
                           onkeydown="if(event.key==='Enter'){event.preventDefault();lookup();}">
                    <button class="btn btn-primary" onclick="lookup()"><i class="fas fa-search me-1"></i>Tra cứu</button>
                </div>
            </div>
        </div>

        <div id="shipmentCard"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script>
    const SHIPPING_URL = 'http://localhost:8006';

    checkAuth();
    const me = api.getCurrentUser();
    if (me && me.role !== 'admin' && me.role !== 'staff') window.location.href = '/profile.html';
    if (me) document.getElementById('sidebarUser').textContent = me.full_name || me.email || '';

    const ORDER_URL = 'http://localhost:8004';
    const PROD_URL = window.PRODUCT_API_URL;
    const STEPS = ['Processing', 'Shipping', 'Delivered'];
    const LABELS = { Processing: 'Đang xử lý', Shipping: 'Đang giao', Delivered: 'Đã giao' };

    function alertMsg(msg, type) {
        const el = document.getElementById('pageAlert');
        el.className = `alert alert-${type}`;
        el.textContent = msg;
        if (type === 'success') setTimeout(() => el.className = 'alert d-none', 3000);
    }

    let currentShipment = null, currentOrder = null, currentCustomer = null;
    let productCache = {};

    async function lookup() {
        const orderId = document.getElementById('orderIdInput').value.trim();
        if (!orderId) return;
        const card = document.getElementById('shipmentCard');
        card.innerHTML = '<div class="text-muted">Đang tra cứu...</div>';

        try {
            // 1) Lấy đơn (admin xem được mọi đơn) → user_id, items, địa chỉ
            const or = await fetch(`${ORDER_URL}/orders/${orderId}`, { headers: { Authorization: `Bearer ${api.getToken()}` } });
            if (or.status === 404) {
                card.innerHTML = `<div class="alert alert-warning">Không tìm thấy đơn #${orderId}.</div>`;
                return;
            }
            if (!or.ok) throw new Error(`Lỗi đọc đơn (${or.status})`);
            currentOrder = await or.json();

            // 2) Lấy thông tin khách (tên, SĐT) cho shipper
            try { currentCustomer = await api.adminGetUser(currentOrder.user_id); } catch { currentCustomer = null; }

            // 3) Tên sản phẩm
            await Promise.all(currentOrder.items.map(async it => {
                if (productCache[it.product_id]) return;
                try { const pr = await fetch(`${PROD_URL}/products/${it.product_id}/`); if (pr.ok) productCache[it.product_id] = await pr.json(); } catch {}
            }));

            // 4) Phiếu giao: chỉ có khi đơn đã thanh toán
            const sr = await fetch(`${SHIPPING_URL}/shipping/status?order_id=${orderId}`);
            if (sr.status === 404) {
                currentShipment = null;
            } else {
                const cr = await fetch(`${SHIPPING_URL}/shipping/create`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ order_id: Number(orderId), address: currentOrder.shipping_address || '-' }),
                });
                currentShipment = await cr.json();
            }
            renderShipment();
        } catch (e) {
            card.innerHTML = `<div class="alert alert-danger">${e.message}</div>`;
        }
    }

    function renderShipment() {
        const o = currentOrder, sm = currentShipment, c = currentCustomer;
        const name = c ? (c.full_name || c.email) : `user #${o.user_id}`;
        const phone = c && c.phone ? c.phone : 'chưa có SĐT';

        const items = o.items.map(it => {
            const p = productCache[it.product_id];
            return `<div class="d-flex justify-content-between small">
                <span>${p ? p.name : '#' + it.product_id} × ${it.quantity}</span>
                <span>${formatPrice(parseFloat(it.unit_price) * it.quantity)}</span>
            </div>`;
        }).join('');

        // Thông tin giao hàng cho shipper
        const shipperInfo = `
            <div class="bg-light rounded p-3 mb-3">
                <div class="fw-bold mb-1"><i class="fas fa-user me-2 text-primary"></i>${name}</div>
                <div class="small"><i class="fas fa-phone me-2 text-muted"></i>${phone}</div>
                <div class="small"><i class="fas fa-map-marker-alt me-2 text-muted"></i>${o.shipping_address}</div>
            </div>`;

        let shipBlock;
        if (!sm) {
            shipBlock = '<div class="alert alert-warning mb-0">Đơn chưa thanh toán nên chưa có phiếu giao.</div>';
        } else {
            const idx = STEPS.indexOf(sm.status);
            const tracker = STEPS.map((s, i) => `
                <div class="text-center flex-fill">
                    <div class="step rounded-circle mx-auto d-flex align-items-center justify-content-center ${i <= idx ? 'bg-success text-white' : 'bg-light text-muted'}">
                        <i class="fas ${i < idx ? 'fa-check' : 'fa-circle'}"></i>
                    </div>
                    <div class="small mt-1 ${i <= idx ? 'fw-bold' : 'text-muted'}">${LABELS[s]}</div>
                </div>
                ${i < STEPS.length - 1 ? '<div class="flex-fill border-top mt-3" style="height:1px"></div>' : ''}`).join('');
            const next = STEPS[idx + 1];
            shipBlock = `
                <div class="d-flex align-items-start justify-content-between mb-4">${tracker}</div>
                ${next
                    ? `<button class="btn btn-success w-100" onclick="advance('${next}')"><i class="fas fa-arrow-right me-1"></i>Chuyển sang "${LABELS[next]}"</button>`
                    : '<div class="alert alert-success mb-0"><i class="fas fa-check-circle me-1"></i>Đơn đã giao xong.</div>'}`;
        }

        document.getElementById('shipmentCard').innerHTML = `
            <div class="card shadow-sm" style="max-width:640px">
                <div class="card-header d-flex justify-content-between">
                    <strong>Đơn #${o.id}${sm ? ' — Phiếu giao #' + sm.id : ''}</strong>
                    <span class="fw-bold text-primary">${formatPrice(o.total_price)}</span>
                </div>
                <div class="card-body">
                    ${shipperInfo}
                    <div class="mb-3">${items}</div>
                    ${shipBlock}
                </div>
            </div>`;
    }

    async function advance(newStatus) {
        try {
            const r = await fetch(`${SHIPPING_URL}/shipping/${currentShipment.id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${api.getToken()}` },
                body: JSON.stringify({ status: newStatus }),
            });
            const data = await r.json();
            if (!r.ok) throw new Error(parseApiError(data, r.status));
            currentShipment = data;
            renderShipment();
            alertMsg(`Đã cập nhật sang "${LABELS[newStatus]}"`, 'success');
        } catch (e) {
            alertMsg(e.message, 'danger');
        }
    }

    async function doLogout() { await api.logout(); window.location.href = '/login.html'; }
</script>
</body>
</html>
