<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
    <style>
        .sidebar { min-height: 100vh; background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); }
        .sidebar .nav-link { color: rgba(255,255,255,.75); border-radius: 8px; margin-bottom: 2px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: rgba(255,255,255,.15); color: #fff; }
        .sidebar .nav-link i { width: 20px; }
        .stat-card { border: none; border-radius: 12px; transition: transform .15s; }
        .stat-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="bg-light">
<div class="d-flex">
    <!-- Sidebar -->
    <div class="sidebar d-flex flex-column p-3" style="width: 230px; flex-shrink: 0;">
        <a href="/" class="text-white text-decoration-none mb-4 ps-2">
            <i class="fas fa-shopping-bag me-2"></i><strong>ecom-final</strong>
            <div class="small text-muted mt-1">Bảng quản trị</div>
        </a>
        <nav class="nav flex-column gap-1">
            <a href="dashboard.html" class="nav-link active"><i class="fas fa-chart-bar me-2"></i>Tổng quan</a>
            <a href="users.html"     class="nav-link"><i class="fas fa-users me-2"></i>Người dùng</a>
            <a href="products.html"  class="nav-link"><i class="fas fa-box me-2"></i>Sản phẩm</a>
            <a href="orders.html"    class="nav-link"><i class="fas fa-list me-2"></i>Đơn hàng</a>
        </nav>
        <div class="mt-auto pt-3 border-top border-secondary">
            <div class="small text-muted mb-2" id="sidebarUser">...</div>
            <a href="#" class="nav-link" onclick="doLogout(); return false;"><i class="fas fa-sign-out-alt me-2"></i>Đăng xuất</a>
        </div>
    </div>

    <!-- Main -->
    <div class="flex-grow-1 p-4">
        <div class="mb-4">
            <h4 class="fw-bold mb-0"><i class="fas fa-chart-bar me-2 text-primary"></i>Tổng quan</h4>
            <p class="text-muted small">Chào mừng quay lại, <span id="welcomeName"></span></p>
        </div>

        <!-- User stats -->
        <h6 class="text-muted text-uppercase small mb-3 fw-bold">Người dùng</h6>
        <div class="row g-3 mb-4">
            <div class="col-6 col-md-3">
                <div class="card stat-card shadow-sm p-3">
                    <div class="d-flex align-items-center gap-3">
                        <div class="rounded-circle bg-primary bg-opacity-10 p-3"><i class="fas fa-users text-primary fa-lg"></i></div>
                        <div>
                            <div class="fs-4 fw-bold" id="statTotal">—</div>
                            <div class="small text-muted">Tổng</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card stat-card shadow-sm p-3">
                    <div class="d-flex align-items-center gap-3">
                        <div class="rounded-circle bg-danger bg-opacity-10 p-3"><i class="fas fa-crown text-danger fa-lg"></i></div>
                        <div>
                            <div class="fs-4 fw-bold" id="statAdmins">—</div>
                            <div class="small text-muted">Admin</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card stat-card shadow-sm p-3">
                    <div class="d-flex align-items-center gap-3">
                        <div class="rounded-circle bg-warning bg-opacity-10 p-3"><i class="fas fa-tools text-warning fa-lg"></i></div>
                        <div>
                            <div class="fs-4 fw-bold" id="statStaff">—</div>
                            <div class="small text-muted">Staff</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card stat-card shadow-sm p-3">
                    <div class="d-flex align-items-center gap-3">
                        <div class="rounded-circle bg-success bg-opacity-10 p-3"><i class="fas fa-user text-success fa-lg"></i></div>
                        <div>
                            <div class="fs-4 fw-bold" id="statCustomers">—</div>
                            <div class="small text-muted">Customer</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Quick links -->
        <h6 class="text-muted text-uppercase small mb-3 fw-bold">Quản lý nhanh</h6>
        <div class="row g-3">
            <div class="col-md-4">
                <a href="users.html" class="card stat-card shadow-sm p-3 text-decoration-none text-dark d-flex flex-row align-items-center gap-3">
                    <i class="fas fa-users fa-2x text-primary"></i>
                    <div>
                        <div class="fw-bold">Người dùng</div>
                        <div class="small text-muted">Xem và quản lý tài khoản</div>
                    </div>
                </a>
            </div>
            <div class="col-md-4">
                <a href="products.html" class="card stat-card shadow-sm p-3 text-decoration-none text-dark d-flex flex-row align-items-center gap-3">
                    <i class="fas fa-box fa-2x text-success"></i>
                    <div>
                        <div class="fw-bold">Sản phẩm</div>
                        <div class="small text-muted">Quản lý danh mục, tồn kho</div>
                    </div>
                </a>
            </div>
            <div class="col-md-4">
                <a href="orders.html" class="card stat-card shadow-sm p-3 text-decoration-none text-dark d-flex flex-row align-items-center gap-3">
                    <i class="fas fa-list fa-2x text-warning"></i>
                    <div>
                        <div class="fw-bold">Đơn hàng</div>
                        <div class="small text-muted">Theo dõi và xử lý đơn</div>
                    </div>
                </a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script>
    checkAuth();
    const me = api.getCurrentUser();
    if (me && me.role !== 'admin') window.location.href = '/profile.html';
    if (me) {
        const name = me.full_name || me.email || me.username || '';
        document.getElementById('sidebarUser').textContent = name;
        document.getElementById('welcomeName').textContent = name;
    }

    async function doLogout() {
        await api.logout();
        window.location.href = '/login.html';
    }

    (async () => {
        try {
            const s = await api.adminGetStats();
            document.getElementById('statTotal').textContent     = s.total;
            document.getElementById('statAdmins').textContent    = s.admins;
            document.getElementById('statStaff').textContent     = s.staff;
            document.getElementById('statCustomers').textContent = s.customers;
        } catch(e) {}
    })();
</script>
</body>
</html>
