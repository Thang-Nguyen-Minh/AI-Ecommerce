<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý người dùng — Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
    <style>
        .sidebar { min-height: 100vh; background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); }
        .sidebar .nav-link { color: rgba(255,255,255,.75); border-radius: 8px; margin-bottom: 2px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: rgba(255,255,255,.15); color: #fff; }
        .sidebar .nav-link i { width: 20px; }
        .stat-card { border: none; border-radius: 12px; }
        .badge-admin    { background: #dc3545; }
        .badge-staff    { background: #fd7e14; }
        .badge-customer { background: #0d6efd; }
        .badge-active   { background: #198754; }
        .badge-inactive { background: #6c757d; }
    </style>
</head>
<body class="bg-light">

<div class="d-flex">
    <!-- ── Sidebar ── -->
    <div class="sidebar d-flex flex-column p-3" style="width: 230px; flex-shrink: 0;">
        <a href="/" class="text-white text-decoration-none mb-4 ps-2">
            <i class="fas fa-shopping-bag me-2"></i><strong>ecom-final</strong>
            <div class="small text-muted mt-1">Bảng quản trị</div>
        </a>
        <nav class="nav flex-column gap-1">
            <a href="dashboard.html" class="nav-link"><i class="fas fa-chart-bar me-2"></i>Tổng quan</a>
            <a href="users.html"     class="nav-link active"><i class="fas fa-users me-2"></i>Người dùng</a>
            <a href="products.html"  class="nav-link"><i class="fas fa-box me-2"></i>Sản phẩm</a>
            <a href="orders.html"    class="nav-link"><i class="fas fa-list me-2"></i>Đơn hàng</a>
        </nav>
        <div class="mt-auto pt-3 border-top border-secondary">
            <div class="small text-muted mb-2" id="sidebarUser">...</div>
            <a href="#" class="nav-link" onclick="doLogout(); return false;"><i class="fas fa-sign-out-alt me-2"></i>Đăng xuất</a>
        </div>
    </div>

    <!-- ── Main ── -->
    <div class="flex-grow-1 p-4">
        <div id="pageAlert" class="alert d-none mb-3"></div>

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h4 class="fw-bold mb-0"><i class="fas fa-users me-2 text-primary"></i>Quản lý người dùng</h4>
                <p class="text-muted small mb-0">Xem, tạo và quản lý tài khoản</p>
            </div>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalCreateUser">
                <i class="fas fa-plus me-2"></i>Tạo tài khoản
            </button>
        </div>

        <!-- Stats cards -->
        <div class="row g-3 mb-4" id="statsRow">
            <div class="col-6 col-md-3">
                <div class="card stat-card shadow-sm p-3 text-center">
                    <div class="fs-2 fw-bold text-primary" id="statTotal">—</div>
                    <div class="small text-muted">Tổng người dùng</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card stat-card shadow-sm p-3 text-center">
                    <div class="fs-2 fw-bold text-danger" id="statAdmins">—</div>
                    <div class="small text-muted">Admin</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card stat-card shadow-sm p-3 text-center">
                    <div class="fs-2 fw-bold text-warning" id="statStaff">—</div>
                    <div class="small text-muted">Staff</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card stat-card shadow-sm p-3 text-center">
                    <div class="fs-2 fw-bold text-success" id="statCustomers">—</div>
                    <div class="small text-muted">Customer</div>
                </div>
            </div>
        </div>

        <!-- Filter / Search -->
        <div class="card shadow-sm mb-3">
            <div class="card-body py-2">
                <div class="row g-2 align-items-center">
                    <div class="col-md-5">
                        <input type="text" id="searchInput" class="form-control form-control-sm" placeholder="Tìm theo email hoặc tên...">
                    </div>
                    <div class="col-md-3">
                        <select id="roleFilter" class="form-select form-select-sm">
                            <option value="">Tất cả vai trò</option>
                            <option value="admin">Admin</option>
                            <option value="staff">Staff</option>
                            <option value="customer">Customer</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <select id="activeFilter" class="form-select form-select-sm">
                            <option value="">Tất cả trạng thái</option>
                            <option value="true">Đang hoạt động</option>
                            <option value="false">Đã khóa</option>
                        </select>
                    </div>
                    <div class="col-md-1 text-end">
                        <span class="text-muted small" id="countLabel"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="card shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Email / Tên</th>
                            <th>Vai trò</th>
                            <th>Trạng thái</th>
                            <th>Ngày tạo</th>
                            <th class="text-end">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="usersBody">
                        <tr><td colspan="5" class="text-center py-4 text-muted">Đang tải...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Modal: Tạo tài khoản staff/admin -->
<div class="modal fade" id="modalCreateUser" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-user-plus me-2"></i>Tạo tài khoản nhân sự</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="createUserForm" onsubmit="createUser(event)">
                <div class="modal-body">
                    <div id="createAlert" class="alert d-none mb-3"></div>
                    <div class="mb-3">
                        <label class="form-label">Email <span class="text-danger">*</span></label>
                        <input type="email" id="cuEmail" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Tên đầy đủ</label>
                        <input type="text" id="cuFullName" class="form-control" placeholder="Không bắt buộc">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mật khẩu <span class="text-danger">*</span></label>
                        <input type="password" id="cuPassword" class="form-control" minlength="8" required>
                        <div class="form-text">Tối thiểu 8 ký tự</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Vai trò <span class="text-danger">*</span></label>
                        <select id="cuRole" class="form-select" required>
                            <option value="staff">🛠 Staff</option>
                            <option value="admin">👑 Admin</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="submit" class="btn btn-primary" id="btnCreateUser">
                        <i class="fas fa-save me-1"></i>Tạo tài khoản
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Modal: Sửa user -->
<div class="modal fade" id="modalEditUser" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-pen me-2"></i>Chỉnh sửa người dùng</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="editUserForm" onsubmit="saveUser(event)">
                <div class="modal-body">
                    <input type="hidden" id="euId">
                    <div id="editUserAlert" class="alert d-none mb-3"></div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" id="euEmail" class="form-control" disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Tên đầy đủ</label>
                        <input type="text" id="euFullName" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Vai trò</label>
                        <select id="euRole" class="form-select">
                            <option value="customer">👤 Customer</option>
                            <option value="staff">🛠 Staff</option>
                            <option value="admin">👑 Admin</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Trạng thái</label>
                        <select id="euActive" class="form-select">
                            <option value="true">Đang hoạt động</option>
                            <option value="false">Khóa tài khoản</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="submit" class="btn btn-primary" id="btnSaveUser">
                        <i class="fas fa-save me-1"></i>Lưu thay đổi
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script>
    // Kiểm tra quyền admin
    checkAuth();
    const me = api.getCurrentUser();
    if (me && me.role !== 'admin') {
        window.location.href = '/profile.html';
    }
    if (me) {
        document.getElementById('sidebarUser').textContent = me.full_name || me.email || me.username || '';
    }

    let allUsers = [];

    // ── Helpers ───────────────────────────────────────────
    const roleLabel = { admin: '👑 Admin', staff: '🛠 Staff', customer: '👤 Customer' };
    const roleBadge = { admin: 'badge-admin', staff: 'badge-staff', customer: 'badge-customer' };

    function showPageAlert(msg, type) {
        const el = document.getElementById('pageAlert');
        el.className = `alert alert-${type}`;
        el.textContent = msg;
        if (type === 'success') setTimeout(() => el.className = 'alert d-none', 3000);
    }

    function showModalAlert(id, msg, type) {
        const el = document.getElementById(id);
        el.className = `alert alert-${type}`;
        el.textContent = msg;
    }

    // ── Load stats ────────────────────────────────────────
    async function loadStats() {
        try {
            const s = await api.adminGetStats();
            document.getElementById('statTotal').textContent     = s.total;
            document.getElementById('statAdmins').textContent    = s.admins;
            document.getElementById('statStaff').textContent     = s.staff;
            document.getElementById('statCustomers').textContent = s.customers;
        } catch(e) { /* stats không critical */ }
    }

    // ── Load + render users ───────────────────────────────
    async function loadUsers() {
        try {
            allUsers = await api.adminGetUsers();
            renderUsers();
        } catch (e) {
            document.getElementById('usersBody').innerHTML =
                `<tr><td colspan="5" class="text-center text-danger py-4">${e.message}</td></tr>`;
        }
    }

    function renderUsers() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const role   = document.getElementById('roleFilter').value;
        const active = document.getElementById('activeFilter').value;

        const filtered = allUsers.filter(u => {
            const matchSearch = !search || u.email.toLowerCase().includes(search) || (u.full_name || '').toLowerCase().includes(search);
            const matchRole   = !role   || u.role === role;
            const matchActive = active === '' || String(u.is_active) === active;
            return matchSearch && matchRole && matchActive;
        });

        document.getElementById('countLabel').textContent = `${filtered.length} người`;

        if (filtered.length === 0) {
            document.getElementById('usersBody').innerHTML =
                '<tr><td colspan="5" class="text-center text-muted py-4">Không có kết quả</td></tr>';
            return;
        }

        document.getElementById('usersBody').innerHTML = filtered.map(u => `
            <tr>
                <td>
                    <div class="fw-500">${u.email}</div>
                    ${u.full_name ? `<div class="text-muted small">${u.full_name}</div>` : ''}
                </td>
                <td><span class="badge ${roleBadge[u.role] || ''}">${roleLabel[u.role] || u.role}</span></td>
                <td>
                    <span class="badge ${u.is_active ? 'badge-active' : 'badge-inactive'}">
                        ${u.is_active ? 'Hoạt động' : 'Đã khóa'}
                    </span>
                </td>
                <td class="small text-muted">${formatDate(u.created_at)}</td>
                <td class="text-end">
                    <a class="btn btn-sm btn-outline-primary me-1" href="customer.html?id=${u.id}" title="Xem chi tiết & đơn hàng">
                        <i class="fas fa-box-open"></i>
                    </a>
                    <button class="btn btn-sm btn-outline-secondary me-1" onclick="openEditUser(${u.id})" title="Sửa">
                        <i class="fas fa-pen"></i>
                    </button>
                    <button class="btn btn-sm ${u.is_active ? 'btn-outline-danger' : 'btn-outline-success'}"
                        onclick="toggleUser(${u.id}, ${u.is_active})"
                        title="${u.is_active ? 'Khóa' : 'Mở khóa'}">
                        <i class="fas fa-${u.is_active ? 'ban' : 'check'}"></i>
                    </button>
                </td>
            </tr>
        `).join('');
    }

    // ── Create user ───────────────────────────────────────
    async function createUser(e) {
        e.preventDefault();
        const email    = document.getElementById('cuEmail').value.trim();
        const fullName = document.getElementById('cuFullName').value.trim();
        const password = document.getElementById('cuPassword').value;
        const role     = document.getElementById('cuRole').value;

        showLoading('btnCreateUser');
        try {
            await api.adminCreateUser(email, password, role, fullName);
            bootstrap.Modal.getInstance(document.getElementById('modalCreateUser')).hide();
            document.getElementById('createUserForm').reset();
            await loadUsers();
            await loadStats();
            showPageAlert(`Đã tạo tài khoản ${role} cho ${email}!`, 'success');
        } catch (err) {
            showModalAlert('createAlert', err.message, 'danger');
        } finally {
            hideLoading('btnCreateUser', '<i class="fas fa-save me-1"></i>Tạo tài khoản');
        }
    }

    // ── Edit user ─────────────────────────────────────────
    function openEditUser(id) {
        const u = allUsers.find(x => x.id === id);
        if (!u) return;
        document.getElementById('euId').value           = u.id;
        document.getElementById('euEmail').value        = u.email;
        document.getElementById('euFullName').value     = u.full_name || '';
        document.getElementById('euRole').value         = u.role;
        document.getElementById('euActive').value       = String(u.is_active);
        document.getElementById('editUserAlert').className = 'alert d-none';
        new bootstrap.Modal(document.getElementById('modalEditUser')).show();
    }

    async function saveUser(e) {
        e.preventDefault();
        const id = document.getElementById('euId').value;
        const data = {
            full_name: document.getElementById('euFullName').value.trim(),
            role:      document.getElementById('euRole').value,
            is_active: document.getElementById('euActive').value === 'true',
        };
        showLoading('btnSaveUser');
        try {
            await api.adminUpdateUser(id, data);
            bootstrap.Modal.getInstance(document.getElementById('modalEditUser')).hide();
            await loadUsers();
            await loadStats();
            showPageAlert('Đã cập nhật thông tin người dùng!', 'success');
        } catch (err) {
            showModalAlert('editUserAlert', err.message, 'danger');
        } finally {
            hideLoading('btnSaveUser', '<i class="fas fa-save me-1"></i>Lưu thay đổi');
        }
    }

    // ── Toggle active ─────────────────────────────────────
    async function toggleUser(id, currentActive) {
        const action = currentActive ? 'khóa' : 'mở khóa';
        if (!confirm(`Xác nhận ${action} tài khoản này?`)) return;
        try {
            if (currentActive) {
                await api.delete(`/users/${id}/`);
            } else {
                await api.adminUpdateUser(id, { is_active: true });
            }
            await loadUsers();
            showPageAlert(`Đã ${action} tài khoản!`, 'success');
        } catch (e) {
            showPageAlert(e.message, 'danger');
        }
    }

    // ── Filters ───────────────────────────────────────────
    document.getElementById('searchInput').addEventListener('input', renderUsers);
    document.getElementById('roleFilter').addEventListener('change', renderUsers);
    document.getElementById('activeFilter').addEventListener('change', renderUsers);

    // ── Logout ────────────────────────────────────────────
    async function doLogout() {
        await api.logout();
        window.location.href = '/login.html';
    }

    // ── Init ──────────────────────────────────────────────
    loadStats();
    loadUsers();

    // Reset modal form khi đóng
    document.getElementById('modalCreateUser').addEventListener('hidden.bs.modal', () => {
        document.getElementById('createUserForm').reset();
        document.getElementById('createAlert').className = 'alert d-none';
    });
</script>
</body>
</html>
