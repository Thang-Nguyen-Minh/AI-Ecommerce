<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat AI — ecom-final</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <style>
        .chat-box { height: 420px; overflow-y: auto; background: #f8f9fa; border-radius: 12px; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 14px; margin-bottom: 10px; }
        .msg-user { background: #667eea; color: #fff; margin-left: auto; }
        .msg-bot  { background: #fff; border: 1px solid #e5e7eb; }
        .sugg-card { cursor: pointer; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark sticky-top" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/"><i class="fas fa-shopping-bag me-2"></i>ecom-final</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="products.html"><i class="fas fa-box me-1"></i>Sản phẩm</a></li>
                <li class="nav-item"><a class="nav-link" href="cart.html"><i class="fas fa-shopping-cart me-1"></i>Giỏ hàng</a></li>
                <li class="nav-item"><a class="nav-link active" href="chat.html"><i class="fas fa-comments me-1"></i>Chat AI</a></li>
                <ul id="navAuthLinks" class="navbar-nav"></ul>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-4" style="max-width: 720px">
    <h4 class="fw-bold mb-3"><i class="fas fa-robot me-2 text-primary"></i>Trợ lý mua sắm AI</h4>

    <div id="chatBox" class="chat-box p-3 mb-3"></div>

    <form id="chatForm" class="d-flex gap-2">
        <input type="text" id="chatInput" class="form-control" placeholder="VD: tôi cần laptop cho sinh viên..." autocomplete="off" required>
        <button class="btn btn-primary" id="btnSend" type="submit"><i class="fas fa-paper-plane"></i></button>
    </form>
    <div class="form-text mt-1">Gợi ý dựa trên sản phẩm có thật trong cửa hàng.</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script>renderNavAuth();</script>
<script>
    const box = document.getElementById('chatBox');

    function addMsg(text, who) {
        const d = document.createElement('div');
        d.className = `msg msg-${who}`;
        d.textContent = text;
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;
        return d;
    }

    async function renderSuggested(ids) {
        if (!ids || !ids.length) return;
        const wrap = document.createElement('div');
        wrap.className = 'row g-2 mb-3';
        box.appendChild(wrap);
        const products = await Promise.all(ids.slice(0, 4).map(id => api.getProduct(id).catch(() => null)));
        products.filter(Boolean).forEach(p => {
            const col = document.createElement('div');
            col.className = 'col-6';
            col.innerHTML = `
                <div class="card sugg-card h-100" onclick="location.href='product-detail.html?id=${p.id}'">
                    <img src="${p.image || 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=200'}" class="card-img-top" style="height:90px;object-fit:cover">
                    <div class="card-body p-2">
                        <div class="small fw-500 text-truncate">${p.name}</div>
                        <div class="small text-primary">${formatPrice(p.price)}</div>
                    </div>
                </div>`;
            wrap.appendChild(col);
        });
        box.scrollTop = box.scrollHeight;
    }

    addMsg('Xin chào! Mình có thể giúp bạn tìm sản phẩm. Bạn đang cần gì?', 'bot');

    document.getElementById('chatForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!api.isLoggedIn()) { window.location.href = '/login.html'; return; }
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;
        addMsg(text, 'user');
        input.value = '';
        const btn = document.getElementById('btnSend');
        btn.disabled = true;
        const typing = addMsg('Đang soạn trả lời...', 'bot');  // U-05: trạng thái chờ
        try {
            const res = await api.aiChat(text);
            typing.textContent = res.reply || 'Mình chưa có câu trả lời phù hợp.';
            await renderSuggested(res.suggested);
        } catch (err) {
            // U-06/U-07: lỗi → báo nhẹ nhàng, không vỡ
            typing.textContent = 'Hệ thống tư vấn tạm bận, bạn thử lại sau nhé.';
        } finally {
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
