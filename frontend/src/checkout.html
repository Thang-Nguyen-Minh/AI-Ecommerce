<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán — ecom-final</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark sticky-top" style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/"><i class="fas fa-shopping-bag me-2"></i>ecom-final</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="cart.html"><i class="fas fa-arrow-left me-1"></i>Giỏ hàng</a></li>
                <ul id="navAuthLinks" class="navbar-nav"></ul>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-4">
    <h4 class="fw-bold mb-4"><i class="fas fa-credit-card me-2"></i>Xác nhận đặt hàng</h4>

    <div id="alertBox" class="alert d-none mb-3"></div>

    <div class="row g-4">
        <!-- Địa chỉ giao hàng -->
        <div class="col-md-7">
            <div class="card shadow-sm">
                <div class="card-header"><h6 class="mb-0"><i class="fas fa-map-pin me-2"></i>Địa chỉ giao hàng</h6></div>
                <div class="card-body">
                    <form id="checkoutForm">
                        <div class="mb-3">
                            <label class="form-label">Địa chỉ nhận hàng <span class="text-danger">*</span></label>
                            <textarea id="shippingAddress" class="form-control" rows="3"
                                placeholder="Số nhà, tên đường, phường/xã, quận/huyện, tỉnh/thành..." required></textarea>
                        </div>
                        <button type="submit" id="btnPlace" class="btn btn-primary w-100" disabled>
                            <span class="spinner-border spinner-border-sm me-2 d-none" id="btnSpinner"></span>
                            Đang tải giỏ...
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Tóm tắt đơn hàng -->
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-header"><h6 class="mb-0"><i class="fas fa-list me-2"></i>Đơn hàng của bạn</h6></div>
                <div class="card-body">
                    <div id="cartPreview">
                        <div class="text-center py-3"><div class="spinner-border spinner-border-sm text-primary"></div></div>
                    </div>
                    <div id="totalBox"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script>renderNavAuth();</script>
<script src="js/checkout.js"></script>
</body>
</html>
