<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký — ecom-final</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="text-center mb-4">
            <div style="font-size:2.5rem">👤</div>
            <h4 class="fw-bold mt-2">Đăng ký tài khoản</h4>
            <p class="text-muted small">Tạo tài khoản mới của bạn</p>
        </div>

        <div id="alertBox" class="alert d-none mb-3" role="alert"></div>

        <form id="registerForm" autocomplete="off">
            <div class="mb-3">
                <label class="form-label">Tên đầy đủ</label>
                <input type="text" id="fullName" class="form-control" placeholder="Nhập tên của bạn" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-control" placeholder="Nhập email của bạn" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Mật khẩu</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Số điện thoại</label>
                <input type="tel" id="phone" class="form-control" placeholder="VD: 0912345678">
            </div>

            <div class="mb-4">
                <label class="form-label">Địa chỉ giao hàng</label>
                <input type="text" id="address" class="form-control" placeholder="Số nhà, đường, phường, quận, tỉnh/thành">
                <div class="form-text">Không bắt buộc — có thể thêm sau trong Hồ sơ.</div>
            </div>

            <button type="submit" class="btn btn-primary-custom text-white w-100 py-2 mb-3" id="btnRegister">
                <i class="fas fa-user-plus me-2"></i>Tạo tài khoản
            </button>
        </form>

        <hr class="my-3">

        <p class="text-center text-muted small mb-3">
            Đã có tài khoản? <a href="login.html" class="text-primary-custom text-decoration-none fw-bold">Đăng nhập</a>
        </p>

        <a href="/" class="btn btn-outline-secondary w-100">
            <i class="fas fa-home me-2"></i>Quay lại trang chủ
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const fullName = document.getElementById('fullName').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const phone = document.getElementById('phone').value.trim();
        const address = document.getElementById('address').value.trim();

        showLoading('btnRegister');

        try {
            const result = await api.register(email, fullName, password, phone, address);
            if (result) {
                // #3: KHÔNG tự đăng nhập — chuyển sang trang đăng nhập kèm thông báo
                showAlert('Đăng ký thành công! Vui lòng đăng nhập.', 'success');
                setTimeout(() => {
                    window.location.href = '/login.html?registered=1';
                }, 1200);
            }
        } catch (error) {
            showAlert(error.message || 'Đăng ký thất bại', 'danger');
        } finally {
            hideLoading('btnRegister', '<i class="fas fa-user-plus me-2"></i>Tạo tài khoản');
        }
    });
</script>
</body>
</html>
