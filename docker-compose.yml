# ═══════════════════════════════════════════════════════════════
#  ecom-final — docker-compose.yml
#  Yêu cầu: chạy "make build-base" trước lần đầu tiên
#  Khởi động: make up  hoặc  docker-compose up -d
# ═══════════════════════════════════════════════════════════════

services:

# ╔═══════════════════════════════════════════════════╗
# ║              API GATEWAY (Nginx)                  ║
# ╚═══════════════════════════════════════════════════╝
  nginx:
    image: nginx:1.25-alpine
    container_name: ecom-gateway
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - user-service
      - product-service
      - cart-service
      - order-service
      - payment-service
      - shipping-service
      - ai-service
    networks:
      - ecom-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

# ╔═══════════════════════════════════════════════════╗
# ║                   FRONTEND                        ║
# ╚═══════════════════════════════════════════════════╝
  frontend:
    image: nginx:1.25-alpine
    container_name: ecom-frontend
    volumes:
      - ./frontend/src:/usr/share/nginx/html:ro
    networks:
      - ecom-network
    restart: unless-stopped

# ╔═══════════════════════════════════════════════════╗
# ║                USER SERVICE                       ║
# ╚═══════════════════════════════════════════════════╝
  user-service:
    image: ecom-django-base:latest       # ← Dùng base image đã build sẵn
    container_name: ecom-user-service
    build:
      context: ./user-service
      dockerfile: Dockerfile
    working_dir: /app
    ports:
      - "8001:8000"
    volumes:
      - ./user-service:/app              # ← Mount code → hot reload
      - ./entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/entrypoint.sh"]
    env_file: .env
    environment:
      SERVICE_NAME:  user-service
      DB_ENGINE:     django.db.backends.mysql
      DB_NAME:       user_db
      DB_USER:       ${MYSQL_USER}
      DB_PASSWORD:   ${MYSQL_PASSWORD}
      DB_HOST:       user-db
      DB_PORT:       "3306"
      SECRET_KEY:    ${SECRET_KEY}
      REDIS_URL:     redis://redis:6379/0
    depends_on:
      user-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecom-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/users/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  user-db:
    image: mysql:8.0
    container_name: ecom-user-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      user_db
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    volumes:
      - user_db_data:/var/lib/mysql
      - ./infrastructure/db/init_user_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - ecom-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "--password=${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s

# ╔═══════════════════════════════════════════════════╗
# ║               PRODUCT SERVICE                     ║
# ╚═══════════════════════════════════════════════════╝
  product-service:
    image: ecom-django-base:latest
    container_name: ecom-product-service
    build:
      context: ./product-service
      dockerfile: Dockerfile
    working_dir: /app
    ports:
      - "8002:8000"
    volumes:
      - ./product-service:/app
      - ./entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/entrypoint.sh"]
    env_file: .env
    environment:
      SERVICE_NAME:  product-service
      DB_ENGINE:     django.db.backends.postgresql
      DB_NAME:       product_db
      DB_USER:       ${POSTGRES_USER}
      DB_PASSWORD:   ${POSTGRES_PASSWORD}
      DB_HOST:       product-db
      DB_PORT:       "5432"
      SECRET_KEY:    ${SECRET_KEY}
    depends_on:
      product-db:
        condition: service_healthy
    networks:
      - ecom-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/products/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  product-db:
    image: postgres:15-alpine
    container_name: ecom-product-db
    environment:
      POSTGRES_DB:       product_db
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - product_db_data:/var/lib/postgresql/data
      - ./infrastructure/db/init_product_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - ecom-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d product_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

# ╔═══════════════════════════════════════════════════╗
# ║                CART SERVICE                       ║
# ╚═══════════════════════════════════════════════════╝
  cart-service:
    image: ecom-django-base:latest
    container_name: ecom-cart-service
    build:
      context: ./cart-service
      dockerfile: Dockerfile
    working_dir: /app
    ports:
      - "8003:8000"
    volumes:
      - ./cart-service:/app
      - ./entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/entrypoint.sh"]
    env_file: .env
    environment:
      SERVICE_NAME:        cart-service
      DB_ENGINE:           django.db.backends.mysql
      DB_NAME:             cart_db
      DB_USER:             ${MYSQL_USER}
      DB_PASSWORD:         ${MYSQL_PASSWORD}
      DB_HOST:             cart-db
      DB_PORT:             "3306"
      SECRET_KEY:          ${SECRET_KEY}
      PRODUCT_SERVICE_URL: http://product-service:8000
    depends_on:
      cart-db:
        condition: service_healthy
      product-service:
        condition: service_healthy
    networks:
      - ecom-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/cart/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  cart-db:
    image: mysql:8.0
    container_name: ecom-cart-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      cart_db
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    volumes:
      - cart_db_data:/var/lib/mysql
      - ./infrastructure/db/init_cart_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - ecom-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "--password=${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s

# ╔═══════════════════════════════════════════════════╗
# ║               ORDER SERVICE                       ║
# ╚═══════════════════════════════════════════════════╝
  order-service:
    image: ecom-django-base:latest
    container_name: ecom-order-service
    build:
      context: ./order-service
      dockerfile: Dockerfile
    working_dir: /app
    ports:
      - "8004:8000"
    volumes:
      - ./order-service:/app
      - ./entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/entrypoint.sh"]
    env_file: .env
    environment:
      SERVICE_NAME:        order-service
      DB_ENGINE:           django.db.backends.postgresql
      DB_NAME:             order_db
      DB_USER:             ${POSTGRES_USER}
      DB_PASSWORD:         ${POSTGRES_PASSWORD}
      DB_HOST:             order-db
      DB_PORT:             "5432"
      SECRET_KEY:          ${SECRET_KEY}
      REDIS_URL:           redis://redis:6379/0
      PRODUCT_SERVICE_URL: http://product-service:8000
      CART_SERVICE_URL:    http://cart-service:8000
      PAYMENT_SERVICE_URL: http://payment-service:8000
      SHIPPING_SERVICE_URL: http://shipping-service:8000
    depends_on:
      order-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      product-service:
        condition: service_healthy
      cart-service:
        condition: service_healthy
    networks:
      - ecom-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/orders/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  order-db:
    image: postgres:15-alpine
    container_name: ecom-order-db
    environment:
      POSTGRES_DB:       order_db
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - order_db_data:/var/lib/postgresql/data
      - ./infrastructure/db/init_order_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - ecom-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d order_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

# ╔═══════════════════════════════════════════════════╗
# ║              PAYMENT SERVICE                      ║
# ╚═══════════════════════════════════════════════════╝
  payment-service:
    image: ecom-django-base:latest
    container_name: ecom-payment-service
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    working_dir: /app
    ports:
      - "8005:8000"
    volumes:
      - ./payment-service:/app
      - ./entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/entrypoint.sh"]
    env_file: .env
    environment:
      SERVICE_NAME:      payment-service
      DB_ENGINE:         django.db.backends.mysql
      DB_NAME:           payment_db
      DB_USER:           ${MYSQL_USER}
      DB_PASSWORD:       ${MYSQL_PASSWORD}
      DB_HOST:           payment-db
      DB_PORT:           "3306"
      SECRET_KEY:        ${SECRET_KEY}
      REDIS_URL:         redis://redis:6379/0
      ORDER_SERVICE_URL: http://order-service:8000
      PAYMENT_SANDBOX:   "true"
    depends_on:
      payment-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      order-service:
        condition: service_healthy
    networks:
      - ecom-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/payment/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  payment-db:
    image: mysql:8.0
    container_name: ecom-payment-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      payment_db
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    volumes:
      - payment_db_data:/var/lib/mysql
      - ./infrastructure/db/init_payment_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - ecom-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "--password=${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s

# ╔═══════════════════════════════════════════════════╗
# ║             SHIPPING SERVICE                      ║
# ╚═══════════════════════════════════════════════════╝
  shipping-service:
    image: ecom-django-base:latest
    container_name: ecom-shipping-service
    build:
