      redis:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    networks:
      - ecom-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/shipping/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  shipping-db:
    image: mysql:8.0
    container_name: ecom-shipping-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      shipping_db
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    volumes:
      - shipping_db_data:/var/lib/mysql
      - ./infrastructure/db/init_shipping_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - ecom-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "--password=${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s

# ╔═══════════════════════════════════════════════════╗
# ║                AI SERVICE                         ║
# ╚═══════════════════════════════════════════════════╝
  ai-service:
    image: ecom-ai-base:latest
    container_name: ecom-ai-service
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    working_dir: /app
    ports:
      - "8007:8000"
    volumes:
      - ./ai-service:/app              # ← hot reload
      - ai_model_cache:/root/.cache    # ← cache model đã download
    env_file: .env
    environment:
      NEO4J_URI:           bolt://neo4j:7687
      NEO4J_USER:          ${NEO4J_USER}
      NEO4J_PASSWORD:      ${NEO4J_PASSWORD}
      REDIS_URL:           redis://redis:6379/0
      OPENAI_API_KEY:      ${OPENAI_API_KEY}
      GOOGLE_API_KEY:      ${GOOGLE_API_KEY}
      PRODUCT_SERVICE_URL: http://product-service:8000
      SECRET_KEY:          ${SECRET_KEY}
    depends_on:
      - neo4j
      - redis
      - product-service
    networks:
      - ecom-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s

# ╔═══════════════════════════════════════════════════╗
# ║           SHARED INFRASTRUCTURE                   ║
# ╚═══════════════════════════════════════════════════╝
  redis:
    image: redis:7-alpine
    container_name: ecom-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - ecom-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  neo4j:
    image: neo4j:5.18
    container_name: ecom-neo4j
    ports:
      - "7474:7474"     # Neo4j Browser UI
      - "7687:7687"     # Bolt protocol
    environment:
      NEO4J_AUTH:                       ${NEO4J_USER}/${NEO4J_PASSWORD}
      # Cho phép mật khẩu < 8 ký tự (ecom123) ở môi trường dev
      NEO4J_dbms_security_auth__minimum__password__length: "4"
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size:     512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - ecom-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

# ═══════════════════════════════════════════════════
#  NETWORKS
# ═══════════════════════════════════════════════════
networks:
  ecom-network:
    driver: bridge
    name:   ecom-network

# ═══════════════════════════════════════════════════
#  VOLUMES
# ═══════════════════════════════════════════════════
volumes:
  # ── Databases ──
  user_db_data:
    name: ecom_user_db
  product_db_data:
    name: ecom_product_db
  cart_db_data:
    name: ecom_cart_db
  order_db_data:
    name: ecom_order_db
  payment_db_data:
    name: ecom_payment_db
  shipping_db_data:
    name: ecom_shipping_db

  # ── Cache & Queue ──
  redis_data:
    name: ecom_redis

  # ── Graph DB ──
  neo4j_data:
    name: ecom_neo4j_data
  neo4j_logs:
    name: ecom_neo4j_logs

  # ── AI Model cache (tránh download lại) ──
  ai_model_cache:
    name: ecom_ai_models